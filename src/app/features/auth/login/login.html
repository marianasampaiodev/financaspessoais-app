<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-violet-600 via-purple-600 to-indigo-700">

  <div class="w-full max-w-md mx-4">

    <!-- Card principal -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">

      <!-- Header -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-violet-500 to-indigo-600 rounded-2xl mb-4 shadow-lg">
            <span class="text-white text-2xl">$</span>
        </div>
        <h1 class="text-2xl font-bold text-gray-800">Bem-vindo!</h1>
        <p class="text-gray-500 mt-1">Acesse sua conta para continuar</p>
      </div>

      <!-- Mensagem de erro -->
      <div *ngIf="errorMessage" class="bg-red-50 border border-red-200 text-red-600 rounded-lg px-4 py-3 mb-6 text-sm">
        {{ errorMessage }}
      </div>

      <!-- Formulário -->
      <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <!-- Campo email -->
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input
            type="email"
            formControlName="email"
            placeholder="seu@email.com"
            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition"
          />
          <!-- Erro de validação -->
          <p *ngIf="email?.invalid && email?.touched" class="text-red-500 text-xs mt-1">
            Digite um email válido.
          </p>
        </div>

        <!-- Campo senha -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
          <input
            type="password"
            formControlName="password"
            placeholder="••••••••"
            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition"
          />
          <p *ngIf="password?.invalid && password?.touched" class="text-red-500 text-xs mt-1">
            A senha deve ter pelo menos 6 caracteres.
          </p>
        </div>

        <!-- Botão entrar -->
        <button
          type="submit"
          [disabled]="loading"
          class="w-full py-3 px-4 bg-gradient-to-r from-violet-600 to-indigo-600 text-white font-semibold rounded-lg shadow-md hover:from-violet-700 hover:to-indigo-700 focus:outline-none focus:ring-2 focus:ring-violet-500 transition disabled:opacity-50 disabled:cursor-not-allowed"
        >
          {{ loading ? 'Entrando...' : 'Entrar' }}
        </button>

      </form>

      <!-- Divisor -->
      <div class="flex items-center my-6">
        <div class="flex-1 border-t border-gray-200"></div>
        <span class="px-4 text-sm text-gray-400">ou continue com</span>
        <div class="flex-1 border-t border-gray-200"></div>
      </div>

      <!-- Botão Google -->
      <button
        (click)="onGoogleLogin()"
        class="w-full py-3 px-4 border border-gray-300 rounded-lg flex items-center justify-center gap-3 hover:bg-gray-50 transition font-medium text-gray-700"
      >
        <svg class="w-5 h-5" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Entrar com Google
      </button>

      <!-- Link para registro -->
      <p class="text-center text-sm text-gray-500 mt-6">
        Não tem uma conta?
        <a routerLink="/auth/register" class="text-violet-600 font-semibold hover:underline">Criar conta</a>
      </p>

    </div>
  </div>
</div>
