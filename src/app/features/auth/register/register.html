<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-violet-600 via-purple-600 to-indigo-700">

  <div class="w-full max-w-md mx-4 my-8">

    <div class="bg-white rounded-2xl shadow-2xl p-8">

      <!-- Header -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-violet-500 to-indigo-600 rounded-2xl mb-4 shadow-lg">
          <span class="text-white text-3xl font-bold">$</span>
        </div>
        <h1 class="text-2xl font-bold text-gray-800">Criar conta</h1>
        <p class="text-gray-500 mt-1">Comece a controlar suas finanças</p>
      </div>

      <!-- Mensagem de erro -->
      <div *ngIf="errorMessage" class="bg-red-50 border border-red-200 text-red-600 rounded-lg px-4 py-3 mb-6 text-sm">
        {{ errorMessage }}
      </div>

      <!-- Mensagem de sucesso -->
      <div *ngIf="successMessage" class="bg-green-50 border border-green-200 text-green-600 rounded-lg px-4 py-3 mb-6 text-sm">
        {{ successMessage }}
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <!-- Nome -->
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Nome</label>
          <input
            type="text"
            formControlName="name"
            placeholder="Seu nome completo"
            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition"
          />
          <p *ngIf="name?.invalid && name?.touched" class="text-red-500 text-xs mt-1">
            Nome deve ter pelo menos 3 caracteres.
          </p>
        </div>

        <!-- Email -->
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input
            type="email"
            formControlName="email"
            placeholder="seu@email.com"
            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition"
          />
          <p *ngIf="email?.invalid && email?.touched" class="text-red-500 text-xs mt-1">
            Digite um email válido.
          </p>
        </div>

        <!-- Senha -->
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
          <input
            type="password"
            formControlName="password"
            placeholder="••••••••"
            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition"
          />
          <p *ngIf="password?.invalid && password?.touched" class="text-red-500 text-xs mt-1">
            A senha deve ter pelo menos 6 caracteres.
          </p>
        </div>

        <!-- Confirmar senha -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1">Confirmar senha</label>
          <input
            type="password"
            formControlName="confirmPassword"
            placeholder="••••••••"
            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition"
          />
          <p *ngIf="confirmPassword?.errors?.['mismatch'] && confirmPassword?.touched" class="text-red-500 text-xs mt-1">
            As senhas não coincidem.
          </p>
        </div>

        <!-- Botão criar conta -->
        <button
          type="submit"
          [disabled]="loading"
          class="w-full py-3 px-4 bg-gradient-to-r from-violet-600 to-indigo-600 text-white font-semibold rounded-lg shadow-md hover:from-violet-700 hover:to-indigo-700 focus:outline-none focus:ring-2 focus:ring-violet-500 transition disabled:opacity-50 disabled:cursor-not-allowed"
        >
          {{ loading ? 'Criando conta...' : 'Criar conta' }}
        </button>

      </form>

      <!-- Link para login -->
      <p class="text-center text-sm text-gray-500 mt-6">
        Já tem uma conta?
        <a routerLink="/auth/login" class="text-violet-600 font-semibold hover:underline">Entrar</a>
      </p>

    </div>
  </div>
</div>
