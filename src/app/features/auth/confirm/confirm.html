<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-violet-600 via-purple-600 to-indigo-700">
  <div class="w-full max-w-md mx-4">
    <div class="bg-white rounded-2xl shadow-2xl p-8 text-center">

      <!-- Logo -->
      <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-violet-500 to-indigo-600 rounded-2xl mb-6 shadow-lg">
        <span class="text-white text-3xl font-bold">$</span>
      </div>

      <!-- Loading -->
      <div *ngIf="status === 'loading'">
        <div class="w-10 h-10 border-4 border-violet-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
        <p class="text-gray-600">Confirmando sua conta...</p>
      </div>

      <!-- Sucesso -->
      <div *ngIf="status === 'success'">
        <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
          <span class="text-green-600 text-3xl">✓</span>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Email confirmado!</h1>
        <p class="text-gray-500 mb-6">Sua conta foi ativada com sucesso. Você será redirecionado para o dashboard em instantes.</p>
        <a routerLink="/dashboard"
          class="w-full py-3 px-4 bg-gradient-to-r from-violet-600 to-indigo-600 text-white font-semibold rounded-lg shadow-md hover:from-violet-700 hover:to-indigo-700 transition inline-block">
          Ir para o dashboard
        </a>
      </div>

      <!-- Erro -->
      <div *ngIf="status === 'error'">
        <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
          <span class="text-red-500 text-3xl">✕</span>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Link inválido</h1>
        <p class="text-gray-500 mb-6">O link de confirmação expirou ou já foi usado. Tente fazer login ou crie uma nova conta.</p>
        <a routerLink="/auth/login"
          class="w-full py-3 px-4 bg-gradient-to-r from-violet-600 to-indigo-600 text-white font-semibold rounded-lg shadow-md hover:from-violet-700 hover:to-indigo-700 transition inline-block">
          Ir para o login
        </a>
      </div>

    </div>
  </div>
</div>
